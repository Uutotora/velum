name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    name: unit tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install test dependencies
        # Installs the `test` dependency-group declared in pyproject.toml —
        # the pure-logic deps only (no torch / napari), so CI stays fast
        # (< 1 min). Heavier GPU/GUI tests run separately.
        run: |
          python -m pip install --upgrade pip
          pip install --group test

      - name: Run tests
        run: pytest -q
