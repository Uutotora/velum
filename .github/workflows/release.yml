# Build downloadable Velum bundles and attach them to a GitHub Release.
#
# Trigger: push a version tag (e.g. `git tag v0.1.0 && git push origin v0.1.0`),
# or run manually from the Actions tab. Produces a macOS .dmg and a Linux
# .tar.gz (self-contained — Python + PyQt6 + CPU torch bundled; the ~2.5 GB SAM
# backbone downloads on first use, small LoRA checkpoints are bundled).
#
# CPU-only torch is installed on purpose: the full CUDA build pushes the Linux
# bundle over GitHub's 2 GB per-release-asset limit, and a desktop distributable
# targets CPU/Apple-MPS anyway (CUDA users install from source). PyInstaller +
# torch can still need a hidden-import shake-down for a new torch version — see
# docs/velum/PACKAGING.md.
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write   # needed to upload assets to the Release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: dist/Velum.dmg
            asset: Velum.dmg
          - os: ubuntu-latest
            artifact: dist/Velum-linux-x86_64.tar.gz
            asset: Velum-linux-x86_64.tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Linux system libs for Qt
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3

      - name: Install CPU torch, the app, and PyInstaller
        run: |
          python -m pip install --upgrade pip
          # CPU-only torch keeps the bundle under GitHub's 2 GB asset limit.
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -e .
          pip install pyinstaller

      - name: Build bundle
        run: bash scripts/build_bundle.sh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  # One release job after BOTH builds finish, so the two matrix jobs don't race
  # to create the same release (which failed the first attempt).
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Attach to Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          fail_on_unmatched_files: true
