# Build downloadable CellSeg1 Studio bundles and attach them to a GitHub Release.
#
# Trigger: push a version tag (e.g. `git tag v0.1.0 && git push origin v0.1.0`),
# or run manually from the Actions tab. Produces a macOS .dmg and a Linux
# .tar.gz (self-contained — Python + torch + PyQt6 bundled; the ~2.5 GB SAM
# backbone downloads on first use, small LoRA checkpoints are bundled).
#
# NOTE: PyInstaller + torch usually needs a shake-down run or two to catch a
# missing hidden import for a specific torch/OS combo — that's expected; iterate
# on the collect flags in scripts/build_bundle.sh. See docstudio/PACKAGING.md.
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write   # needed to upload assets to the Release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: dist/CellSeg1-Studio.dmg
          - os: ubuntu-latest
            artifact: dist/CellSeg1-Studio-linux-x86_64.tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Linux system libs for Qt
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3

      - name: Install app + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller

      - name: Build bundle
        run: bash scripts/build_bundle.sh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: cellseg1-studio-${{ matrix.os }}
          path: ${{ matrix.artifact }}

      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
